services:
  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    depends_on:
      - zipkin
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - observability

  service-a:
    build: ./service-a
    ports:
      - "8080:8080"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      SERVICE_B_URL: http://service-b:8081
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - observability

  service-b:
    build: ./service-b
    ports:
      - "8081:8081"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      WEATHER_API_KEY: ${WEATHER_API_KEY:-your-api-key-here}
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - observability

networks:
  observability:
    driver: bridge
